{% for result in results %}
<div hx-get="/index/{{ result.symbol }}" 
     hx-target="#main-content" 
     hx-push-url="true"
     class="p-4 bg-slate-800 border border-slate-700 rounded-xl cursor-pointer hover:bg-slate-700 transition flex justify-between items-center group">
    <div>
        <span class="font-bold text-white group-hover:text-blue-400 transition">{{ result.name }}</span>
        <span class="ml-2 text-xs text-slate-500 font-mono uppercase">{{ result.symbol }}</span>
    </div>
    <div class="flex items-center space-x-2">
        <span class="text-xs px-2 py-1 bg-slate-900 text-slate-400 rounded border border-slate-700">{{ result.country }}</span>
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-600 group-hover:text-white transition" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
        </svg>
    </div>
</div>
{% else %}
<div class="text-center py-8 text-slate-500">
    No indices found matching "{{ query }}"
</div>
{% endfor %}
