<div class="space-y-2">
    <div class="flex items-start justify-between gap-4">
        <div>
            <p class="text-sm font-medium text-slate-200">{{ row.label }}</p>
            <p class="text-xs text-slate-500">{{ row.transactions }} transactions</p>
        </div>
        <div class="text-right">
            <p class="text-sm font-semibold text-white">{{ row.amount }}</p>
            <p class="text-xs text-slate-500">{{ row.percent }}</p>
        </div>
    </div>
    <div class="h-2 bg-slate-900 rounded-full overflow-hidden">
        <div class="h-full bg-blue-500 rounded-full" style="width: {{ row.percent }}"></div>
    </div>
</div>
