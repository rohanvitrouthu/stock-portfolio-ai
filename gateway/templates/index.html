{% extends "base.html" %}

{% block content %}
<div class="flex flex-col items-center justify-center py-12">
    <div class="text-center mb-12">
        <h2 class="text-4xl font-extrabold mb-4">Discover Your Next Investment</h2>
        <p class="text-slate-400 text-lg">Search global indices or individual stocks to begin your research.</p>
    </div>

    <!-- Index Search Box -->
    <div class="w-full max-w-2xl space-y-6">
        <div class="relative group">
            <input type="text" 
                   name="index_query" 
                   placeholder="Search for Market Indices (e.g. S&P 500, Nifty 50...)" 
                   class="w-full p-4 pl-12 bg-slate-800 border border-slate-700 rounded-xl text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent transition outline-none"
                   hx-post="/search/indices" 
                   hx-trigger="keyup changed delay:500ms" 
                   hx-target="#index-results" 
                   hx-indicator="#search-loader">
            <div class="absolute left-4 top-4 text-slate-500 group-focus-within:text-blue-400 transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            </div>
        </div>
        
        <div id="search-loader" class="htmx-indicator flex justify-center">
            <div class="animate-spin rounded-full h-6 w-6 border-b-2 border-blue-500"></div>
        </div>

        <div id="index-results" class="grid grid-cols-1 gap-3">
            <!-- Results will be injected here -->
        </div>
    </div>
</div>
{% endblock %}
