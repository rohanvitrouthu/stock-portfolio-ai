<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Portfolio AI</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans">
    <nav class="border-b border-slate-800 p-4 flex justify-between items-center bg-slate-900 sticky top-0 z-10">
        <h1 class="text-xl font-bold tracking-tight text-blue-400">STOCK<span class="text-white">PORTFOLIO</span>AI</h1>
        <div class="space-x-4">
            <a href="/" class="text-slate-400 hover:text-white transition">Home</a>
            <a href="/portfolio" class="text-slate-400 hover:text-white transition">Portfolio</a>
            <a href="/settings" class="text-slate-400 hover:text-white transition">Settings</a>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-6">
        <div id="main-content">
            {% block content %}{% endblock %}
        </div>
    </main>
</body>
</html>
